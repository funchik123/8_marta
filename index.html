<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта 💖</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:radial-gradient(circle at center,#ff69b4,#8b008b,#2a002a);
    font-family:Arial,sans-serif;
}

/* Canvas */
canvas{
    position:absolute;
    top:0;
    left:0;
}

/* Центр */
.center{
    position:absolute;
    width:100%;
    text-align:center;
    top:30%;
    color:white;
}
h1{
    font-size:70px;
    opacity:0;
    transform:scale(0.5);
    text-shadow:0 0 20px white,0 0 40px #ff69b4,0 0 80px #ff1493;
}
.show{
    animation:pop 2s ease-out forwards;
}
@keyframes pop{
    0%{opacity:0;transform:scale(0.5);}
    60%{opacity:1;transform:scale(1.3);}
    100%{opacity:1;transform:scale(1);}
}

/* Кнопка */
.btn{
    position:absolute;
    top:55%;
    left:50%;
    transform:translateX(-50%);
    padding:20px 50px;
    font-size:24px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:linear-gradient(145deg,#ff1493,#ff69b4);
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}
.btn:hover{
    transform:translateX(-50%) scale(1.1);
}

/* Подпись */
.credit{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:12px;
    color:white;
    opacity:0.6;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="center">
    <h1 id="text">💖 Всех с 8 Марта! 💕</h1>
</div>

<button class="btn" id="startBtn" onclick="startShow()">Посмотреть</button>

<div class="credit">Создано Дэни</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c1a4b8d6b.mp3?filename=happy-day-110244.mp3">
</audio>

<audio id="boom">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f6b8c63f7.mp3?filename=firework-explosion-110246.mp3">
</audio>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
let running=false;

function random(min,max){return Math.random()*(max-min)+min;}

function Firework(x,y){
    for(let i=0;i<120;i++){
        particles.push({
            x:x,
            y:y,
            angle:Math.random()*Math.PI*2,
            speed:random(2,8),
            alpha:1,
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }
    document.getElementById("boom").currentTime=0;
    document.getElementById("boom").play();
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.alpha-=0.01;

        ctx.beginPath();
        ctx.arc(p.x,p.y,3,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.globalAlpha=p.alpha;
        ctx.fill();
        ctx.globalAlpha=1;

        if(p.alpha<=0) particles.splice(i,1);
    });

    if(running) requestAnimationFrame(animate);
}

function startShow(){
    document.getElementById("startBtn").style.display="none";
    document.getElementById("text").classList.add("show");

    const music=document.getElementById("music");
    music.play();

    running=true;
    animate();

    setInterval(()=>{
        Firework(random(100,canvas.width-100),random(100,canvas.height/2));
    },900);
}
</script>

</body>
</html>
