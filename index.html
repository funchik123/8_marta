<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта 🎆</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at center, #ff69b4, #ff1493, #4b004b);
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Arial, sans-serif;
    }

    button {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 12px;
        background: white;
        cursor: pointer;
        transition: 0.4s;
        z-index: 5;
    }

    button:hover {
        transform: scale(1.1);
        background: #ffe4e1;
    }

    h1 {
        position: absolute;
        font-size: 65px;
        color: white;
        text-align: center;
        opacity: 0;
        transform: scale(0.5);
        text-shadow: 0 0 15px white, 0 0 30px #ff69b4, 0 0 60px #ff1493;
    }

    .showText {
        animation: showText 2s ease-out forwards;
    }

    @keyframes showText {
        0% { opacity: 0; transform: scale(0.5); }
        60% { opacity: 1; transform: scale(1.25); }
        100% { opacity: 1; transform: scale(1); }
    }

    .particle {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        pointer-events: none;
        box-shadow: 0 0 10px white, 0 0 20px currentColor;
    }

    .petal {
        position: absolute;
        width: 15px;
        height: 20px;
        background: pink;
        border-radius: 50% 50% 50% 50%;
        opacity: 0.8;
        pointer-events: none;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(360deg);
            opacity: 0;
        }
    }

    .credit {
        position: absolute;
        bottom: 15px;
        font-size: 12px;
        color: white;
        opacity: 0;
        animation: fadeIn 3s ease forwards;
        animation-delay: 2s;
    }

    @keyframes fadeIn {
        to { opacity: 0.7; }
    }
</style>
</head>
<body>

<button id="btn" onclick="startShow()">Посмотреть</button>
<h1 id="text">💖 Всех с 8 Марта! 💕</h1>
<div class="credit">Создано Дэни</div>

<!-- Музыка -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c1a4b8d6b.mp3?filename=happy-day-110244.mp3" type="audio/mpeg">
</audio>

<!-- Звук взрыва -->
<audio id="boom">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f6b8c63f7.mp3?filename=firework-explosion-110246.mp3" type="audio/mpeg">
</audio>

<script>
function startShow() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("text").classList.add("showText");
    document.getElementById("music").play();

    setInterval(createFirework, 900);
    setInterval(createPetals, 400);
}

function createFirework() {
    const boom = document.getElementById("boom");
    boom.currentTime = 0;
    boom.play();

    const centerX = Math.random() * window.innerWidth;
    const centerY = Math.random() * window.innerHeight / 2;

    for (let i = 0; i < 100; i++) {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 200 + 50;

        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        particle.style.left = centerX + "px";
        particle.style.top = centerY + "px";
        particle.style.background = randomColor();
        particle.style.color = randomColor();

        document.body.appendChild(particle);

        particle.animate([
            { transform: "translate(0,0)", opacity: 1 },
            { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
        ], {
            duration: 1400,
            easing: "ease-out"
        });

        setTimeout(() => particle.remove(), 1400);
    }
}

function createPetals() {
    const petal = document.createElement("div");
    petal.classList.add("petal");

    petal.style.left = Math.random() * window.innerWidth + "px";
    petal.style.animationDuration = (Math.random() * 5 + 5) + "s";

    document.body.appendChild(petal);

    setTimeout(() => petal.remove(), 10000);
}

function randomColor() {
    const colors = ["#ffd700", "#ff69b4", "#ffffff", "#ff1493", "#ffb6c1"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
