<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта 💖</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:radial-gradient(circle at center,#ff69b4,#8b008b,#2a002a);
    font-family:Arial,sans-serif;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.center{
    position:absolute;
    width:100%;
    text-align:center;
    top:30%;
    color:white;
    z-index:10;
    pointer-events:none;
}

h1{
    font-size:70px;
    opacity:0;
    transform:scale(0.5);
    text-shadow:0 0 20px white,0 0 40px #ff69b4,0 0 80px #ff1493;
    margin-bottom:20px;
}

.subtitle{
    font-size:30px;
    opacity:0;
    transform:translateY(20px);
    text-shadow:0 0 15px rgba(255,255,255,0.8);
    transition:all 1s ease;
}

.show{
    animation:pop 2s ease-out forwards;
}

.show-subtitle{
    opacity:1 !important;
    transform:translateY(0) !important;
}

@keyframes pop{
    0%{opacity:0;transform:scale(0.5);}
    60%{opacity:1;transform:scale(1.3);}
    100%{opacity:1;transform:scale(1);}
}

.btn{
    position:absolute;
    top:55%;
    left:50%;
    transform:translateX(-50%);
    padding:20px 50px;
    font-size:24px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:linear-gradient(145deg,#ff1493,#ff69b4);
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
    z-index:20;
    border:2px solid rgba(255,255,255,0.3);
}

.btn:hover{
    transform:translateX(-50%) scale(1.1);
    box-shadow:0 15px 40px rgba(255,20,147,0.6);
}

.credit{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:14px;
    color:white;
    opacity:0.6;
    z-index:10;
    letter-spacing:1px;
}

.flower-decoration{
    position:absolute;
    bottom:20px;
    left:20px;
    font-size:30px;
    opacity:0.5;
    animation:float 3s ease-in-out infinite;
    z-index:5;
}

.flower-decoration2{
    position:absolute;
    top:20px;
    right:20px;
    font-size:40px;
    opacity:0.5;
    animation:float 4s ease-in-out infinite reverse;
    z-index:5;
}

@keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-20px) rotate(10deg);}
}

/* Адаптация для мобильных */
@media (max-width:768px){
    h1{font-size:40px;}
    .btn{padding:15px 30px;font-size:18px;}
    .subtitle{font-size:20px;}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="flower-decoration">🌸🌷🌹</div>
<div class="flower-decoration2">🌺🌼🌸</div>

<div class="center">
    <h1 id="text">💖 С 8 Марта! 💕</h1>
    <div id="subtitle" class="subtitle">Пусть сбываются мечты! ✨</div>
</div>

<button class="btn" id="startBtn" onclick="startShow()">✨ Посмотреть ✨</button>

<div class="credit">Создано Дэни с любовью 💝</div>

<audio id="music" loop preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c1a4b8d6b.mp3?filename=happy-day-110244.mp3" type="audio/mpeg">
</audio>

<audio id="boom" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f6b8c63f7.mp3?filename=firework-explosion-110246.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
let running=false;

// Обработка изменения размера окна
window.addEventListener('resize', ()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
});

function random(min,max){return Math.random()*(max-min)+min;}

function Firework(x,y){
    // Основные частицы
    for(let i=0;i<150;i++){
        particles.push({
            x:x,
            y:y,
            angle:Math.random()*Math.PI*2,
            speed:random(2,10),
            alpha:1,
            size:random(2,6),
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }
    
    // Добавляем "золотые" частицы
    for(let i=0;i<30;i++){
        particles.push({
            x:x,
            y:y,
            angle:Math.random()*Math.PI*2,
            speed:random(3,8),
            alpha:1,
            size:random(3,7),
            color:'gold'
        });
    }
    
    // Воспроизводим звук с небольшой задержкой для синхронизации
    setTimeout(()=>{
        const boom=document.getElementById("boom");
        boom.currentTime=0;
        boom.play().catch(e=>console.log("Аудио не удалось воспроизвести"));
    },50);
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.speed*=0.99; // Замедление
        p.alpha-=0.008;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size||3,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.globalAlpha=p.alpha;
        ctx.fill();
        
        // Добавляем свечение
        ctx.shadowColor='white';
        ctx.shadowBlur=10;
        ctx.fill();
        ctx.shadowBlur=0;

        if(p.alpha<=0) particles.splice(i,1);
    });
    
    ctx.globalAlpha=1;

    if(running) requestAnimationFrame(animate);
}

function startShow(){
    const btn=document.getElementById("startBtn");
    btn.style.display="none";
    
    // Показываем текст
    document.getElementById("text").classList.add("show");
    
    // Показываем подзаголовок через 1.5 секунды
    setTimeout(()=>{
        document.getElementById("subtitle").classList.add("show-subtitle");
    },1500);

    const music=document.getElementById("music");
    music.volume=0.5; // Устанавливаем громкость
    music.play().catch(e=>console.log("Музыка не удалось воспроизвести"));

    running=true;
    animate();

    // Запускаем салюты
    let count=0;
    const interval=setInterval(()=>{
        const x=random(100,canvas.width-100);
        const y=random(100,canvas.height/2);
        Firework(x,y);
        count++;
        
        // Останавливаем через 30 салютов
        if(count>=30) clearInterval(interval);
    },800);
    
    // Добавляем финальный большой салют через 10 секунд
    setTimeout(()=>{
        for(let i=0;i<5;i++){
            setTimeout(()=>{
                Firework(
                    random(canvas.width/3,canvas.width*2/3),
                    random(100,canvas.height/3)
                );
            },i*200);
        }
    },10000);
}
</script>

</body>
</html>
